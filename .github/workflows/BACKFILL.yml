name: BACKFILL_CP_BACKTEST

on:
  workflow_dispatch:
    inputs:
      phases:
        description: 'Comma-separated phases to run (momentum,oscillators,tvv,pct,ratios,metrics,core). Leave empty for all.'
        required: false
        default: ''

jobs:
  backfill:
    runs-on: ubuntu-latest
    environment: testsecrets
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backfill script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_NAME_BT: ${{ secrets.DB_NAME_BT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
          GITHUB_ACTIONS: true
        run: |
          if [ -n "${{ github.event.inputs.phases }}" ]; then
            python gcp_postgres_sandbox/backtesting/backfill_cp_backtest.py --only "${{ github.event.inputs.phases }}"
          else
            python gcp_postgres_sandbox/backtesting/backfill_cp_backtest.py
          fi
        continue-on-error: false
