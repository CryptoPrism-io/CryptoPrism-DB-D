name: BACKFILL_CP_BACKTEST

on:
  workflow_dispatch: {}  # Manual trigger only

jobs:
  backfill:
    runs-on: ubuntu-latest
    environment: testsecrets
    timeout-minutes: 360  # 6 hour max (ratios phase can be slow)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backfill script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_NAME_BT: ${{ secrets.DB_NAME_BT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
          GITHUB_ACTIONS: true
        run: python gcp_postgres_sandbox/backtesting/backfill_cp_backtest.py
        continue-on-error: false
